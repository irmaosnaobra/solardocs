<style>
  *, *::before, *::after { box-sizing: border-box; }
  html, body {
    margin: 0; padding: 0;
    background: #0a0a0a;
    color: #fff;
    font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
    -webkit-font-smoothing: antialiased;
    overflow-x: hidden;
    min-height: 100vh;
    min-height: 100dvh;
  }

  .stage {
    min-height: 100vh;
    min-height: 100dvh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 16px;
    background:
      radial-gradient(ellipse 70% 50% at 50% 0%, rgba(245,158,11,0.12) 0%, transparent 60%),
      #0a0a0a;
  }

  .player-col {
    width: 100%;
    /* Cap pela altura também: 9/16 ≈ 0.5625 → largura máxima = (vh − padding) × 0.5625 */
    max-width: min(420px, calc((100dvh - 48px) * 0.5625));
  }

  .player {
    position: relative;
    width: 100%;
    aspect-ratio: 9 / 16;
    background: #000;
    border-radius: 18px;
    overflow: hidden;
    box-shadow:
      0 25px 50px -10px rgba(0,0,0,0.8),
      0 0 0 1px rgba(245,158,11,0.18);
  }

  .player iframe {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    border: 0;
  }

  @media (min-width: 760px) {
    .player-col { max-width: min(460px, calc((100dvh - 48px) * 0.5625)); }
  }

  /* CTA próprio (parent document) — navegação same-tab, funciona em iPhone/WhatsApp */
  .cta {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    margin-top: 16px;
    padding: 16px 20px;
    width: 100%;
    border-radius: 14px;
    background: linear-gradient(180deg, #F5A623 0%, #E8910F 100%);
    color: #1a1205;
    font-weight: 800;
    font-size: 17px;
    letter-spacing: 0.2px;
    text-decoration: none;
    box-shadow: 0 10px 30px -8px rgba(245,158,11,0.55), inset 0 1px 0 rgba(255,255,255,0.35);
    -webkit-tap-highlight-color: transparent;
    transition: transform .12s ease, box-shadow .12s ease, opacity .5s ease;
    /* Escondido até o vídeo chegar em ~04:30 (revelado via JS pela timeline) */
    opacity: 0;
    transform: translateY(8px);
    pointer-events: none;
    /* Ocupa espaço só quando revelado */
    display: none;
  }
  .cta.is-visible {
    display: flex;
    opacity: 1;
    transform: translateY(0);
    pointer-events: auto;
    animation: ctaIn .5s ease forwards;
  }
  .cta:active { transform: scale(.98); }
  .cta .arrow { font-size: 18px; line-height: 1; transition: transform .15s ease; }
  .cta:hover .arrow { transform: translateX(3px); }
  @keyframes ctaIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
  @media (hover: none) { .cta:hover .arrow { transform: none; } }
</style>
</head>
<body>

<main class="stage">
  <div class="player-col">
    <div class="player">
      <iframe
        src="https://player-vz-380ec774-9b3.tv.pandavideo.com.br/embed/?v=bff5383a-0111-45f5-8ab9-46468dd31afe"
        allow="accelerometer;gyroscope;autoplay;encrypted-media;picture-in-picture"
        allowfullscreen="true"
        fetchpriority="high"></iframe>
    </div>
    <div id="e46431f6-a66a-41c6-90e6-c9413c6d3d9b"></div>

    <!-- CTA próprio: navegação same-tab (funciona em iPhone/WhatsApp).
         Não usamos o botão nativo do Panda porque o setParentWindowUrl falha
         em Safari/in-app browser. Destino = LP (home), onde o lead escolhe o plano. -->
    <a class="cta" id="cta" href="/">
      Quero começar agora <span class="arrow">→</span>
    </a>
  </div>
</main>

<script>
  // ===== Tracking de visita na VSL =====
  (function () {
    try {
      const STORAGE_KEY = 'solardoc_session_id';
      let sid = localStorage.getItem(STORAGE_KEY);
      if (!sid) {
        sid = (crypto.randomUUID && crypto.randomUUID()) || (Date.now() + '-' + Math.random().toString(36).slice(2));
        localStorage.setItem(STORAGE_KEY, sid);
      }
      const qs = new URLSearchParams(location.search);

      // Repassa UTMs/parâmetros da VSL pro CTA, sem perder mode/plano
      try {
        const cta = document.getElementById('cta');
        if (cta && [...qs.keys()].length) {
          const url = new URL(cta.getAttribute('href'), location.origin);
          qs.forEach((v, k) => { if (!url.searchParams.has(k)) url.searchParams.set(k, v); });
          cta.setAttribute('href', url.pathname + url.search);
        }
      } catch {}

      fetch('/_api/_t/v', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          session_id: sid,
          landing_url: '/apresentacao',
          referrer: document.referrer || null,
          utm_source: qs.get('utm_source'),
          utm_medium: qs.get('utm_medium'),
          utm_campaign: qs.get('utm_campaign'),
          utm_content: qs.get('utm_content'),
          utm_term: qs.get('utm_term'),
        }),
        keepalive: true,
      }).catch(() => {});
    } catch {}
  })();
</script>

<script>
  document.addEventListener('readystatechange', () => {
    if (document.readyState !== 'complete') return;
    const hlsLink = 'https://b-vz-380ec774-9b3.tv.pandavideo.com.br/bff5383a-0111-45f5-8ab9-46468dd31afe/playlist.m3u8';
    const pullzone = hlsLink.split('b-')[1].split('.')[0];
    const id = hlsLink.split('.com.br/')[1].split('/')[0];
    if (!document.querySelector('script[src^="https://player.pandavideo.com.br/api.v2.js"]')) {
      const s = document.createElement('script');
      s.src = 'https://player.pandavideo.com.br/api.v2.js';
      s.async = true;
      document.head.appendChild(s);
    }
    window.pandascripttag = window.pandascripttag || [];
    window.pandascripttag.push(function () {
      const p = new PandaPlayer('iframe[src*="' + pullzone + '"][src*="' + id + '"]', {
        onReady() {
          p.setParentWindowUrl();
        }
      });
    });
  });

  // ===== Revela o CTA aos 04:30 pela timeline do player =====
  // Não usamos o botão nativo do Panda (loadButtonInTime): ele não navega em
  // Safari/in-app browser mesmo com setParentWindowUrl. E não dependemos da
  // API onEvent do SDK (formato incerto): escutamos direto o postMessage do
  // player — padrão provado em produção na LP. O iframe posta
  // { message: 'panda_timeupdate', currentTime } independente de configuração.
  (function () {
    const REVEAL_AT = 270; // 04:30 em segundos
    const cta = document.getElementById('cta');
    if (!cta) return;
    let revealed = false;
    function onMessage(ev) {
      const data = ev && ev.data;
      if (!data || typeof data !== 'object') return;
      if (data.message !== 'panda_timeupdate') return;
      if (typeof data.currentTime !== 'number') return;
      if (data.currentTime >= REVEAL_AT && !revealed) {
        revealed = true;
        cta.classList.add('is-visible');
        window.removeEventListener('message', onMessage);
      }
    }
    window.addEventListener('message', onMessage);
  })();
</script>

</body>
