<script>
  // ===== Tracking de visita na VSL =====
  (function () {
    try {
      const STORAGE_KEY = 'solardoc_session_id';
      let sid = localStorage.getItem(STORAGE_KEY);
      if (!sid) {
        sid = (crypto.randomUUID && crypto.randomUUID()) || (Date.now() + '-' + Math.random().toString(36).slice(2));
        localStorage.setItem(STORAGE_KEY, sid);
      }
      const qs = new URLSearchParams(location.search);
      fetch('/_api/tracking/visit', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          session_id: sid,
          landing_url: '/apresentacao',
          referrer: document.referrer || null,
          utm_source: qs.get('utm_source'),
          utm_medium: qs.get('utm_medium'),
          utm_campaign: qs.get('utm_campaign'),
          utm_content: qs.get('utm_content'),
          utm_term: qs.get('utm_term'),
        }),
        keepalive: true,
      }).catch(() => {});
    } catch {}
  })();
</script>

<script>
  document.addEventListener('readystatechange', () => {
    if (document.readyState !== 'complete') return;
    const hlsLink = 'https://b-vz-380ec774-9b3.tv.pandavideo.com.br/bff5383a-0111-45f5-8ab9-46468dd31afe/playlist.m3u8';
    const pullzone = hlsLink.split('b-')[1].split('.')[0];
    const id = hlsLink.split('.com.br/')[1].split('/')[0];
    if (!document.querySelector('script[src^="https://player.pandavideo.com.br/api.v2.js"]')) {
      const s = document.createElement('script');
      s.src = 'https://player.pandavideo.com.br/api.v2.js';
      s.async = true;
      document.head.appendChild(s);
    }
    window.pandascripttag = window.pandascripttag || [];
    window.pandascripttag.push(function () {
      const p = new PandaPlayer('iframe[src*="' + pullzone + '"][src*="' + id + '"]', {
        onReady() {
          p.loadButtonInTime({ fetchApi: true });
          p.setParentWindowUrl();
        }
      });
    });
  });
</script>
