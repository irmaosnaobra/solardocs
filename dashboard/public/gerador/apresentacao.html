<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="robots" content="noindex">
<title>Apresentação — Eletroposto</title>
<style>
  :root{
    --bg:#0a0d12; --card:#151a24; --card2:#10141d; --borda:rgba(255,255,255,.07);
    --tx:#eceef2; --tx2:#98a1b0; --lar:#f97316; --verde:#34d399;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html{scroll-snap-type:y mandatory;scroll-behavior:smooth}
  body{background:var(--bg);color:var(--tx);font-family:Arial,Helvetica,sans-serif;line-height:1.45}
  .sl{min-height:100svh;scroll-snap-align:start;display:flex;flex-direction:column;padding:clamp(18px,4vh,54px) clamp(20px,5.5vw,84px) 0;position:relative;overflow:hidden}
  .sl-corpo{flex:1;display:flex;flex-direction:column;justify-content:center;max-width:1280px;width:100%;margin:0 auto;position:relative;z-index:1}
  .kicker{font-size:clamp(11px,1.05vw,14px);font-weight:700;letter-spacing:.35em;text-transform:uppercase;color:var(--lar);margin-bottom:16px}
  .kicker.verde{color:var(--verde)}
  h1{font-size:clamp(30px,4.4vw,60px);font-weight:800;line-height:1.1;letter-spacing:-.5px}
  h2{font-size:clamp(23px,3vw,42px);font-weight:800;line-height:1.15;margin-bottom:clamp(16px,2.8vh,32px)}
  .sub{color:var(--tx2);font-size:clamp(14px,1.35vw,18px);margin-top:14px;max-width:620px}
  .quote{margin-top:clamp(18px,3.4vh,34px);background:var(--card);border-left:5px solid var(--lar);border-radius:12px;padding:clamp(14px,2.2vw,26px) clamp(16px,2.6vw,30px);font-style:italic;font-weight:700;font-size:clamp(15px,1.7vw,22px);max-width:660px}
  .quote .hl{color:var(--lar)}
  .grid{display:grid;gap:clamp(10px,1.5vw,18px)}
  .g2{grid-template-columns:repeat(2,1fr)} .g3{grid-template-columns:repeat(3,1fr)}
  @media(max-width:820px){.g2,.g3,.capa-grid,.g23,.g32{grid-template-columns:1fr!important}}
  .cardx{background:var(--card);border:1px solid var(--borda);border-radius:14px;padding:clamp(13px,1.8vw,22px)}
  .ic{width:clamp(38px,3.4vw,50px);height:clamp(38px,3.4vw,50px);border-radius:50%;display:flex;align-items:center;justify-content:center;margin-bottom:12px;flex-shrink:0}
  .ic svg{width:55%;height:55%;stroke:#0a0d12;stroke-width:2.2;fill:none;stroke-linecap:round;stroke-linejoin:round}
  .ic.lar{background:var(--lar)} .ic.verde{background:var(--verde)}
  .cardx b{display:block;font-size:clamp(14.5px,1.4vw,19px);margin-bottom:5px}
  .cardx p{color:var(--tx2);font-size:clamp(12px,1.15vw,14.5px)}
  .cardx .nslide{position:absolute;top:14px;right:16px;font-size:clamp(20px,2.2vw,30px);font-weight:800;color:rgba(255,255,255,.08)}
  .box-dest{border:1.5px solid var(--lar);border-radius:12px;background:var(--card2);padding:clamp(13px,1.8vw,22px);font-style:italic;font-weight:700;font-size:clamp(14px,1.5vw,20px)}
  .box-dest .hl{color:var(--lar)} .box-dest.vd{border-color:var(--verde)} .box-dest .hlv{color:var(--verde)}
  .rodape{max-width:1280px;width:100%;margin:0 auto;padding:12px 0 14px;border-top:1px solid var(--borda);display:flex;justify-content:space-between;align-items:center;font-size:clamp(9px,.9vw,11.5px);letter-spacing:.12em;color:var(--tx2)}
  .rodape b{color:var(--tx)} .rodape .x{color:var(--lar)}
  .num{font-weight:700;color:#5d6470}
  /* reveal */
  .rv{opacity:0;transform:translateY(18px);transition:opacity .6s ease,transform .6s ease}
  .rv.vis{opacity:1;transform:none}
  /* capa */
  .capa-grid{display:grid;grid-template-columns:1.25fr 1fr;gap:clamp(20px,3.5vw,54px);align-items:center}
  .capa-mapa{position:relative;text-align:center}
  .capa-mapa img{width:min(100%,420px);border-radius:18px}
  .capa-badge{position:absolute;top:10px;right:6%;background:var(--verde);color:#06281c;font-weight:800;font-size:clamp(9.5px,.95vw,12px);letter-spacing:.14em;padding:7px 14px;border-radius:999px}
  .capa-marcas{display:flex;align-items:center;gap:13px;margin-top:clamp(22px,4.4vh,46px);font-weight:800;letter-spacing:.22em;font-size:clamp(12.5px,1.45vw,18px)}
  .capa-marcas img{height:clamp(38px,4.6vw,60px)}
  .capa-marcas .x,.capa-marcas .sm{color:var(--lar)}
  .capa-cliente{margin-top:12px;color:var(--tx2);font-size:clamp(12.5px,1.35vw,17px)}
  .capa-cliente b{color:var(--tx)}
  /* chart genérico */
  .chartbox{background:var(--card);border:1px solid var(--borda);border-radius:16px;padding:clamp(13px,1.8vw,24px)}
  .chartbox .ct{font-weight:700;font-size:clamp(12.5px,1.25vw,16px);margin-bottom:10px}
  .legenda{display:flex;gap:16px;font-size:clamp(10.5px,1.05vw,13px);color:var(--tx2);margin-bottom:6px}
  .legenda i{display:inline-block;width:20px;height:4px;border-radius:2px;margin-right:6px;vertical-align:middle}
  /* projeto (equipamento) */
  .proj-foto{border-radius:16px;width:100%;max-width:380px;display:block;margin:0 auto}
  .chk{display:flex;align-items:center;gap:11px;margin-bottom:10px;font-weight:700;font-size:clamp(12.5px,1.25vw,16px)}
  .chk .ok{width:24px;height:24px;border-radius:50%;background:rgba(52,211,153,.14);border:1.5px solid var(--verde);color:var(--verde);display:flex;align-items:center;justify-content:center;font-size:12px;flex-shrink:0}
  .chk .ok.n{background:transparent;border-color:var(--lar);color:var(--lar)}
  .chk .no{width:24px;height:24px;border-radius:50%;background:rgba(248,113,113,.1);border:1.5px solid rgba(248,113,113,.5);color:#f87171;display:flex;align-items:center;justify-content:center;font-size:12px;flex-shrink:0}
  /* cenários */
  .cen{position:relative;background:var(--card);border:1px solid var(--borda);border-radius:16px;padding:clamp(15px,2vw,26px)}
  .cen.dest{border:2px solid var(--lar)}
  .cen .selo{position:absolute;top:-12px;left:50%;transform:translateX(-50%);background:var(--lar);color:#231000;font-size:10px;font-weight:800;letter-spacing:.14em;padding:4px 14px;border-radius:999px;white-space:nowrap}
  .cen h3{font-size:clamp(16px,1.7vw,23px)} .cen h3.lar{color:var(--lar)}
  .cen .carros{color:var(--tx2);font-size:clamp(11.5px,1.15vw,14px);margin-bottom:10px}
  .cen .kt{font-size:clamp(9px,.9vw,11.5px);font-weight:700;letter-spacing:.12em;color:var(--tx2);text-transform:uppercase;margin-top:12px;border-top:1px solid var(--borda);padding-top:10px}
  .cen .kv{font-size:clamp(18px,2vw,28px);font-weight:800}
  .cen .kv.verde{color:var(--verde)} .cen .kv.lar{color:var(--lar)}
  /* premissas */
  .prem td{padding:9px 0;border-bottom:1px solid var(--borda);font-size:clamp(12.5px,1.25vw,16px)}
  .prem tr:last-child td{border-bottom:none}
  .prem td:first-child{color:var(--tx2);font-size:clamp(10px,.98vw,12.5px);letter-spacing:.1em;text-transform:uppercase;font-weight:700;padding-right:16px}
  .prem td:last-child{font-weight:800;text-align:right}
  .prem .verde{color:var(--verde)}
  .forma{background:var(--card2);border:1px solid var(--borda);border-radius:12px;padding:12px 16px;margin-bottom:10px}
  .forma .ft{font-size:clamp(9px,.9vw,11.5px);font-weight:700;letter-spacing:.12em;color:var(--tx2);text-transform:uppercase;margin-bottom:3px}
  .forma .fx{color:var(--tx2);font-size:clamp(11.5px,1.12vw,14px)}
  .forma .fr{font-weight:800;font-size:clamp(14px,1.4vw,19px);color:var(--verde)}
  .forma .fr.lar{color:var(--lar)}
  /* solar flow */
  .flow{display:flex;align-items:stretch;gap:10px}
  .flow .seta-f{align-self:center;color:var(--tx2);font-size:20px;flex-shrink:0}
  .flow .cardx{flex:1;text-align:center}
  .flow .cardx b{font-size:clamp(12.5px,1.2vw,16px);letter-spacing:.08em}
  .flow .cardx .ic{margin:0 auto 10px}
  /* destaque lateral */
  .destaque-lateral{background:var(--card);border:1.5px solid var(--verde);border-radius:16px;padding:clamp(15px,2vw,26px);display:flex;flex-direction:column;justify-content:center}
  .destaque-lateral .big{font-size:clamp(28px,3.6vw,50px);font-weight:800;color:var(--verde);margin:6px 0}
  .destaque-lateral p{color:var(--tx2);font-size:clamp(12px,1.2vw,15px)}
  .destaque-lateral .hl{color:var(--lar);font-weight:700}
  /* diferencial */
  .dif h4{font-size:clamp(12px,1.15vw,15px);letter-spacing:.16em;margin-bottom:16px}
  .dif.voce{border:1.5px solid var(--verde)}
  .dif.voce h4{color:var(--verde)}
  .dif h4.cz{color:var(--tx2)}
  /* modelos */
  .mod{position:relative}
  .mod .mk{font-size:clamp(9.5px,.95vw,12px);font-weight:700;letter-spacing:.16em;color:var(--tx2)}
  .mod h3{font-size:clamp(18px,2vw,27px);margin:5px 0 2px} .mod h3.verde{color:var(--verde)}
  .mod .tag{font-weight:700;color:var(--lar);font-size:clamp(11.5px,1.12vw,14px);margin-bottom:10px} .mod .tag.verde{color:var(--verde)}
  .mod p{color:var(--tx2);font-size:clamp(12px,1.18vw,14.5px)}
  .mod .obs{font-style:italic;margin-top:12px;font-size:clamp(11px,1.05vw,13px)}
  .mod.dest{border:2px solid var(--verde)}
  .mod .selo{position:absolute;top:-12px;right:14px;background:var(--verde);color:#06281c;font-size:9.5px;font-weight:800;letter-spacing:.12em;padding:4px 12px;border-radius:999px}
  /* investimento */
  .inv-big{font-size:clamp(38px,5.6vw,78px);font-weight:800;letter-spacing:-1px}
  .inv-lbl{font-size:clamp(9.5px,.95vw,12.5px);font-weight:700;letter-spacing:.2em;color:var(--tx2);text-transform:uppercase}
  .inv-pay{font-size:clamp(24px,3.1vw,42px);font-weight:800}
  .inv-pay .hl{color:var(--lar)}
  /* visão de futuro */
  .visao{position:relative}
  .visao .orb{position:absolute;right:6%;top:8%;width:clamp(180px,26vw,380px);height:clamp(180px,26vw,380px);border-radius:50%;background:radial-gradient(circle,rgba(249,115,22,.55),rgba(249,115,22,.12) 55%,transparent 72%);filter:blur(6px);z-index:0}
  .visao .skyline{position:absolute;right:0;bottom:0;left:0;height:34%;z-index:0;opacity:.5}
  /* encerramento */
  .fim{text-align:center}
  .fim .marcas{font-weight:800;letter-spacing:.25em;font-size:clamp(16px,2.3vw,30px)}
  .fim .marcas .x{color:var(--lar)}
  .fim .frase{margin:24px auto 0;font-style:italic;font-weight:700;font-size:clamp(15px,1.9vw,25px);max-width:800px}
  .fim .frase .hl{color:var(--lar)} .fim .frase .hlv{color:var(--verde)}
  .fim .contato{margin-top:26px;color:var(--tx2);font-size:clamp(12.5px,1.35vw,17px)}
  .fim .contato b{color:var(--tx);font-size:clamp(14px,1.6vw,21px)}
  .setahint{position:fixed;right:16px;bottom:16px;background:var(--card);border:1px solid var(--borda);color:var(--tx2);border-radius:999px;padding:9px 15px;font-size:11.5px;letter-spacing:.08em;opacity:.85;z-index:9}
  @media print{
    html{scroll-snap-type:none}
    .setahint{display:none}
    .rv{opacity:1!important;transform:none!important}
    .sl{min-height:0;height:186mm;page-break-after:always;break-after:page;padding:10mm 14mm 0}
    .sl:last-child{page-break-after:auto}
    @page{size:A4 landscape;margin:0}
    body{-webkit-print-color-adjust:exact;print-color-adjust:exact}
  }
</style>

<body>
<div id="deck">Carregando…</div>
<div class="setahint">▼ role para avançar</div>
<script>
// ===================================================================================
// Apresentação comercial do Eletroposto — nasce dos números do simulador (/gerador).
// Recebe os parâmetros por querystring e recalcula com AS MESMAS fórmulas do
// computeEletro do index.html. ⚠ MANTER EM SINCRONIA se as fórmulas mudarem lá.
// ===================================================================================
const q = new URLSearchParams(location.search);
const N = (k, d) => { const v = parseFloat((q.get(k) || '').replace(',', '.')); return isFinite(v) ? v : d; };
const S = (k, d) => (q.get(k) || d || '').trim();

const p = {
  carros: N('carros', 10), carga: N('carga', 20), custoKwh: N('custokwh', 0.95),
  precoKwh: N('precokwh', 2.35), ativacao: N('ativ', 1.20), invest: N('invest', 180000),
  plugs: N('plugs', 2), assinat: N('assin', 0), fixos: N('fixos', 300),
  gateway: N('gateway', 14) / 100, arrend: N('arrend', 10) / 100, manut: N('manut', 0.1) / 100,
  imposto: N('imposto', 6) / 100, ocupIni: N('ocup', 50) / 100, mesesRampa: N('rampa', 24),
  taxaDesc: N('taxadesc', 14.25) / 100,
};
const t = { cliente: S('cliente'), cidade: S('cidade'), equip: S('equip', 'SolMob DC 80 kW'), autor: S('autor'), contato: S('contato') };

function computa(px) {
  const DIAS = 30, ANOS = 10;
  const kwhMes = px.carros * px.carga * DIAS;
  const fatMes = kwhMes * px.precoKwh + px.carros * DIAS * px.ativacao;
  const custoEnergia = kwhMes * px.custoKwh;
  const taxas = px.gateway + px.arrend + px.manut + px.imposto;
  const seguroMes = px.invest * 0.01 / 12;
  const fixosMes = px.assinat + seguroMes + (px.fixos || 0);
  const margemVar = fatMes - custoEnergia - fatMes * taxas;
  const lucroMes = margemVar - fixosMes;
  const mR = Math.max(1, Math.round(px.mesesRampa)); const oI = Math.min(1, Math.max(0, px.ocupIni));
  const occ = m => (mR <= 1 || m >= mR) ? 1 : oI + (1 - oI) * (m - 1) / (mR - 1);
  const fluxoAnual = [];
  for (let a = 0; a < ANOS; a++) { let l = 0; for (let m = 1; m <= 12; m++) l += margemVar * occ(a * 12 + m) - fixosMes; fluxoAnual.push(l); }
  const fluxo = []; let acc = -px.invest, payback = null;
  fluxoAnual.forEach((f, i) => { const antes = acc; acc += f; fluxo.push(acc); if (payback === null && acc >= 0 && f > 0) payback = i + (0 - antes) / f; });
  return { fatMes, fatAno: fatMes * 12, lucroMes, lucroAno: lucroMes * 12, lucroAno1: fluxoAnual[0], payback, fluxo, acumulado10: fluxo[ANOS - 1] };
}
const money = n => 'R$ ' + Math.round(n || 0).toLocaleString('pt-BR');
const anos1 = v => v == null ? '—' : v.toFixed(1).replace('.', ',') + ' anos';

const base = computa(p);
const cons = computa({ ...p, carros: Math.max(1, Math.round(p.carros * 0.6)) });
const otim = computa({ ...p, carros: Math.round(p.carros * 1.4) });
const carrosCons = Math.max(1, Math.round(p.carros * 0.6)), carrosOtim = Math.round(p.carros * 1.4);
const ticket = Math.round(p.carga * p.precoKwh + p.ativacao);
const ANO = new Date().getFullYear();

// ---- ícones (stroke escuro sobre círculo colorido, estilo do deck original) ----
const IC = {
  car: '<path d="M5 16l1.5-5.5A2 2 0 0 1 8.4 9h7.2a2 2 0 0 1 1.9 1.5L19 16"/><rect x="3.5" y="16" width="17" height="4" rx="1.2"/><circle cx="7.5" cy="20" r="1.4"/><circle cx="16.5" cy="20" r="1.4"/>',
  radio: '<circle cx="12" cy="12" r="1.6"/><path d="M8.5 8.5a5 5 0 0 0 0 7"/><path d="M15.5 8.5a5 5 0 0 1 0 7"/><path d="M6 6a8.5 8.5 0 0 0 0 12"/><path d="M18 6a8.5 8.5 0 0 1 0 12"/>',
  pin: '<path d="M12 21s-6.5-5.4-6.5-10.5a6.5 6.5 0 0 1 13 0C18.5 15.6 12 21 12 21z"/><circle cx="12" cy="10.3" r="2.2"/>',
  users: '<circle cx="9" cy="8.5" r="3"/><path d="M3.5 19a5.5 5.5 0 0 1 11 0"/><circle cx="16.8" cy="9.5" r="2.3"/><path d="M15.5 14.2a4.6 4.6 0 0 1 5 4.3"/>',
  clock: '<circle cx="12" cy="12" r="8.5"/><path d="M12 7.5V12l3 2"/>',
  zap: '<path d="M13 2.5 4.5 13.5H11l-1 8 8.5-11H12l1-8z"/>',
  bat: '<rect x="3" y="8" width="15" height="8" rx="1.6"/><path d="M21 11v2"/><path d="M7 10.5v3M10.5 10.5v3"/>',
  phone: '<rect x="7.5" y="3" width="9" height="18" rx="1.8"/><path d="M11 18h2"/>',
  sun: '<circle cx="12" cy="12" r="3.6"/><path d="M12 3.5v2M12 18.5v2M3.5 12h2M18.5 12h2M6 6l1.4 1.4M16.6 16.6 18 18M18 6l-1.4 1.4M7.4 16.6 6 18"/>',
  cog: '<circle cx="12" cy="12" r="2.6"/><path d="M12 4v2.2M12 17.8V20M4 12h2.2M17.8 12H20M6.3 6.3l1.6 1.6M16.1 16.1l1.6 1.6M17.7 6.3l-1.6 1.6M7.9 16.1l-1.6 1.6"/>',
  store: '<path d="M4.5 9.5 6 4.5h12l1.5 5"/><path d="M5 9.5h14v10H5z"/><path d="M9.5 19.5v-5h5v5"/>',
  award: '<circle cx="12" cy="9" r="5"/><path d="M9 13.5 7.5 21l4.5-2.5L16.5 21 15 13.5"/>',
  coins: '<ellipse cx="10" cy="7" rx="6.5" ry="3"/><path d="M3.5 7v5c0 1.7 2.9 3 6.5 3s6.5-1.3 6.5-3V7"/><path d="M3.5 12v5c0 1.7 2.9 3 6.5 3s6.5-1.3 6.5-3v-5"/><path d="M20.5 11v6"/>',
  plug: '<path d="M9 3.5V8M15 3.5V8"/><path d="M7 8h10v3a5 5 0 0 1-10 0V8z"/><path d="M12 16v4.5"/>',
  chart: '<path d="M4 19.5h16"/><path d="M7 19.5v-6M12 19.5V8M17 19.5v-9"/>',
  cap: '<path d="M12 4 2.5 9 12 14l9.5-5L12 4z"/><path d="M6.5 11.5V16c0 1.4 2.5 2.8 5.5 2.8s5.5-1.4 5.5-2.8v-4.5"/>',
  rocket: '<path d="M12 3c3.5 1.5 5.5 5 5.5 8.5L14 15h-4l-3.5-3.5C6.5 8 8.5 4.5 12 3z"/><circle cx="12" cy="9" r="1.6"/><path d="M9 16.5 7.5 20M15 16.5 16.5 20M12 16.5V21"/>',
  shield: '<path d="M12 3.5 5 6v5.5c0 4.5 3 7.9 7 9 4-1.1 7-4.5 7-9V6l-7-2.5z"/><path d="m9 11.8 2.2 2.2 3.8-4"/>',
  home: '<path d="M4 11.5 12 5l8 6.5"/><path d="M6.5 10v9.5h11V10"/><path d="M10 19.5v-5h4v5"/>',
};
const ico = (nome, cor) => `<span class="ic ${cor}"><svg viewBox="0 0 24 24">${IC[nome]}</svg></span>`;

// ---- gráfico: curva de adoção (slide 2) ----
function chartAdocao() {
  const W = 640, H = 300, padX = 30, padB = 34, padT = 16;
  const anos = ['’20','’21','’22','’23','’24','’25','’26','’27','’28'];
  const pts = anos.map((_, i) => {
    const x = padX + (W - padX * 2) * i / (anos.length - 1);
    const v = Math.pow(1.62, i);                       // curva exponencial ilustrativa
    return [x, v];
  });
  const vmax = pts[pts.length - 1][1];
  const Y = v => padT + (H - padB - padT) * (1 - v / vmax);
  let d = `M ${pts[0][0]} ${Y(pts[0][1])}`;
  pts.slice(1).forEach(pt => d += ` L ${pt[0]} ${Y(pt[1])}`);
  const area = d + ` L ${pts[pts.length - 1][0]} ${H - padB} L ${pts[0][0]} ${H - padB} Z`;
  const labels = anos.map((a, i) => `<text x="${pts[i][0]}" y="${H - 12}" fill="#98a1b0" font-size="12" text-anchor="middle">${a}</text>`).join('');
  return `<svg viewBox="0 0 ${W} ${H}" width="100%">
    <defs><linearGradient id="ga" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#f97316" stop-opacity=".85"/><stop offset="1" stop-color="#f97316" stop-opacity=".08"/>
    </linearGradient></defs>
    <line x1="${padX}" y1="${H - padB}" x2="${W - padX}" y2="${H - padB}" stroke="rgba(255,255,255,.16)"/>
    <path d="${area}" fill="url(#ga)"/>
    <path d="${d}" fill="none" stroke="#f97316" stroke-width="3.5" stroke-linejoin="round"/>
    ${labels}</svg>`;
}
// ---- gráfico: acumulação 10 anos (2 séries) ----
function chartAcumulacao() {
  const W = 720, H = 300, padX = 56, padY = 24, padB = 30;
  const series = [{ f: otim.fluxo, cor: '#34d399' }, { f: base.fluxo, cor: '#f97316' }];
  const all = [...otim.fluxo, ...base.fluxo];
  const mx = Math.max(...all), mn = Math.min(...all);
  const X = i => padX + (W - padX - 18) * i / 9;
  const Y = v => padY + (H - padY - padB) * (mx - v) / (mx - mn || 1);
  let g = `<line x1="${padX}" y1="${Y(0)}" x2="${W - 12}" y2="${Y(0)}" stroke="rgba(255,255,255,.18)" stroke-dasharray="4 4"/>
           <text x="${padX - 8}" y="${Y(0) + 4}" fill="#98a1b0" font-size="11" text-anchor="end">R$ 0</text>`;
  for (const s of series) {
    const pts = s.f.map((v, i) => `${X(i).toFixed(1)},${Y(v).toFixed(1)}`).join(' ');
    g += `<polyline points="${pts}" fill="none" stroke="${s.cor}" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>`;
    [0, 2, 4, 9].forEach(i => g += `<circle cx="${X(i)}" cy="${Y(s.f[i])}" r="5" fill="${s.cor}"/>`);
  }
  [1, 3, 5, 10].forEach(a => g += `<text x="${X(a - 1)}" y="${H - 6}" fill="#98a1b0" font-size="12" text-anchor="middle">Ano ${a}</text>`);
  return `<svg viewBox="0 0 ${W} ${H}" width="100%">${g}</svg>`;
}
// ---- gráfico: sem solar × com solar ----
function chartSolar() {
  const semS = base.lucroAno, comS = base.lucroAno * 1.4;
  const W = 420, H = 280, bw = 110, gap = 70, x0 = 70, base0 = H - 46;
  const hmax = base0 - 60;
  const h1 = hmax * semS / comS, h2 = hmax;
  return `<svg viewBox="0 0 ${W} ${H}" width="100%">
    <rect x="${x0}" y="${base0 - h1}" width="${bw}" height="${h1}" rx="6" fill="#9aa3b2"/>
    <rect x="${x0 + bw + gap}" y="${base0 - h2}" width="${bw}" height="${h2}" rx="6" fill="#34d399"/>
    <text x="${x0 + bw / 2}" y="${base0 - h1 - 12}" fill="#eceef2" font-size="17" font-weight="700" text-anchor="middle">${money(semS)}</text>
    <text x="${x0 + bw + gap + bw / 2}" y="${base0 - h2 - 12}" fill="#eceef2" font-size="17" font-weight="700" text-anchor="middle">${money(comS)}</text>
    <text x="${x0 + bw / 2}" y="${base0 + 24}" fill="#98a1b0" font-size="14" text-anchor="middle">Sem solar</text>
    <text x="${x0 + bw + gap + bw / 2}" y="${base0 + 24}" fill="#98a1b0" font-size="14" text-anchor="middle">Com solar</text>
  </svg>`;
}

        <div><b>Cobertura premium inclusa</b><p>Estrutura metálica + iluminação LED. A cobertura que valoriza o ponto e protege quem carrega.</p></div>
      </div>
      <div class="cardx" style="flex:1;display:flex;flex-direction:column;justify-content:center">
        <div class="chk"><span class="ok">✓</span>Estação completa, instalada e operacional</div>
        <div class="chk"><span class="ok">✓</span>Entrega chave na mão</div>
        <div class="chk" style="margin-bottom:0"><span class="ok">✓</span>Sem custos escondidos</div>
      </div>
    </div>
  </div>
</div>${rodape(13)}</section>

<!-- 14 · MODELOS DE ENTRADA -->
<section class="sl"><div class="sl-corpo">
  <div class="kicker verde rv">Como entrar</div>
  <h2 class="rv">Não precisa ser tudo do seu bolso</h2>
  <div class="sub rv" style="margin:-14px 0 18px">Três formas de entrar — a gente adapta ao que faz sentido pra você.</div>
  <div class="grid g3 rv" style="margin-top:6px">
    <div class="cardx mod">
      <div style="display:flex;justify-content:space-between;align-items:flex-start"><div class="mk">MODELO 01</div>${ico('coins','lar')}</div>
      <h3>Comprar</h3><div class="tag">Seja dono do ativo</div>
      <p>Investimento único, chave na mão. A estação é sua e 100% da receita fica com você.</p>
      <p class="obs">Pra quem quer o retorno cheio e o patrimônio no nome.</p>
    </div>
    <div class="cardx mod">
      <div style="display:flex;justify-content:space-between;align-items:flex-start"><div class="mk">MODELO 02</div>${ico('users','lar')}</div>
      <h3>Alugar</h3><div class="tag">Sem tirar do bolso</div>
      <p>Você cede o espaço, a gente instala e opera. Você recebe todo mês, sem investir e sem risco.</p>
      <p class="obs">Pra quem quer renda passiva, sem dor de cabeça.</p>
    </div>
    <div class="cardx mod dest">
      <div class="selo">A GENTE ENTRA JUNTO</div>
      <div style="display:flex;justify-content:space-between;align-items:flex-start"><div class="mk">MODELO 03</div>${ico('rocket','verde')}</div>
      <h3 class="verde">Sociedade</h3><div class="tag verde">Investimos com você</div>
      <p>Se o seu ponto é forte, a Irmãos na Obra põe dinheiro na mesa e divide a receita. Só entramos onde acreditamos.</p>
      <p class="obs">Pra quem quer crescer com um sócio que investe de verdade.</p>
    </div>
  </div>
</div>${rodape(14)}</section>

<!-- 15 · VISÃO DE FUTURO -->
<section class="sl visao">
  <div class="orb"></div>
  <svg class="skyline" viewBox="0 0 1200 240" preserveAspectRatio="xMidYMax slice">
    ${[...Array(16)].map((_, i) => { const w = 46 + (i * 37) % 60, h = 60 + (i * 53) % 150, x = i * 78, y = 240 - h; return `<rect x="${x}" y="${y}" width="${w}" height="${h}" rx="3" fill="#131a26" stroke="rgba(255,255,255,.05)"/>` + [...Array(5)].map((__, j) => `<rect x="${x + 8 + (j * 17) % (w - 14)}" y="${y + 12 + (j * 31) % (h - 24)}" width="4" height="4" fill="${j % 3 ? '#34d399' : '#f97316'}" opacity=".8"/>`).join(''); }).join('')}
  </svg>
  <div class="sl-corpo">
    <div class="kicker rv">Visão de futuro</div>
    <h1 class="rv" style="font-size:clamp(28px,4vw,54px)">Um Brasil conectado,<br>inteligente e elétrico</h1>
    <div class="quote rv" style="margin-top:clamp(22px,4.5vh,44px)">“Os próximos anos definirão quem será <span style="color:var(--verde)">referência em mobilidade elétrica</span> no Brasil.”</div>
  </div>
${rodape(15)}</section>

<!-- 16 · ENCERRAMENTO -->
<section class="sl fim"><div class="sl-corpo" style="align-items:center;text-align:center">
  <img class="rv" src="/gerador/logo-io.png" alt="" style="height:clamp(60px,8.5vw,104px);margin-bottom:24px">
  <div class="marcas rv">IRMÃOS NA OBRA <span class="x">×</span> <span style="color:var(--lar)">SOLMOB</span></div>
  <div class="frase rv">Transformando <span class="hl">localização em patrimônio</span>, <span class="hlv">energia em receita</span> e visão em crescimento.</div>
  <div class="contato rv">
    ${t.autor ? `<b>${t.autor}</b><br>` : ''}${t.contato ? `${t.contato}<br>` : ''}
    <span style="letter-spacing:.18em;font-size:clamp(9.5px,.95vw,12.5px)">PROPOSTA COMERCIAL · ATENDEMOS TODO O BRASIL · ${ANO}</span>
  </div>
</div>${rodape(16)}</section>`;

document.title = (t.cliente ? t.cliente.replace(/\s+/g, '') + '_' : '') + 'Eletroposto_Apresentacao';

// reveal on scroll
const io = new IntersectionObserver(es => es.forEach(e => { if (e.isIntersecting) e.target.classList.add('vis'); }), { threshold: .18 });
document.querySelectorAll('.rv').forEach(el => io.observe(el));

// navegação por teclado
document.addEventListener('keydown', e => {
  const sls = [...document.querySelectorAll('.sl')];
  const atual = Math.round(window.scrollY / window.innerHeight);
  if (e.key === 'ArrowDown' || e.key === 'PageDown' || e.key === ' ') { e.preventDefault(); sls[Math.min(sls.length - 1, atual + 1)]?.scrollIntoView(); }
  if (e.key === 'ArrowUp' || e.key === 'PageUp') { e.preventDefault(); sls[Math.max(0, atual - 1)]?.scrollIntoView(); }
});
</script>
</body>
</html>
