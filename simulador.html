<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Simulador de Economia Solar - Irmãos na Obra</title>
  
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Lexend:wght@700;800&display=swap" rel="stylesheet" />
  
  <!-- Meta Pixel Code -->
  <script>
    !function(f,b,e,v,n,t,s)
    {if(f.fbq)return;n=f.fbq=function(){n.callMethod?
    n.callMethod.apply(n,arguments):n.queue.push(arguments)};
    if(!f._fbq)f._fbq=n;n.push=n;n.loaded=!0;n.version='2.0';
    n.queue=[];t=b.createElement(e);t.async=!0;
    t.src=v;s=b.getElementsByTagName(e)[0];
    s.parentNode.insertBefore(t,s)}(window, document,'script',
    'https://connect.facebook.net/en_US/fbevents.js');
    fbq('init', '446093469730871');
    fbq('track', 'PageView');
  </script>
  <noscript><img height="1" width="1" style="display:none"
    src="https://www.facebook.com/tr?id=446093469730871&ev=PageView&noscript=1"
  /></noscript>
  <!-- End Meta Pixel Code -->

  <style>
    :root {
      --bg: #020617;
      --surface: #0f172a;
      --text: #f8fafc;
      --muted: #94a3b8;
      --primary: #3b82f6;
      --solar: #f59e0b;
      --solar-glow: rgba(245, 158, 11, 0.4);
      --border: rgba(255, 255, 255, 0.08);
      --radius: 20px;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Inter', sans-serif; }
    
    html, body { 
      height: 100%; 
      margin: 0; 
      padding: 0; 
      background-color: var(--bg);
      overflow: hidden;
    }
    
    body { 
      color: var(--text); 
      display: flex; 
      justify-content: center; 
      align-items: center; 
      -webkit-font-smoothing: antialiased; 
    }

    .container {
      width: 100%;
      max-width: 600px;
      height: 100svh;
      background: var(--surface);
      display: flex;
      flex-direction: column;
      position: relative;
      overflow-y: auto;
      scrollbar-width: none;
      border-left: 1px solid var(--border);
      border-right: 1px solid var(--border);
    }
    .container::-webkit-scrollbar { display: none; }

    /* Grid de energia animado */
    .container::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      background-image: 
        linear-gradient(rgba(245, 158, 11, 0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(245, 158, 11, 0.03) 1px, transparent 1px);
      background-size: 30px 30px;
      pointer-events: none;
      z-index: 0;
    }

    @media (min-width: 601px) {
      .container { height: 90vh; border-radius: 24px; box-shadow: 0 0 60px rgba(0,0,0,0.2); border: 1px solid var(--border); }
    }

    /* VIEWS */
    .view { display: none; flex-direction: column; padding: 40px 24px; flex: 1; animation: fadeIn 0.4s cubic-bezier(0.16, 1, 0.3, 1); position: relative; z-index: 10; }
    .view.active { display: flex; }

    @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

    /* WELCOME */
    .welcome-view { text-align: center; justify-content: center; align-items: center; background: radial-gradient(circle at center, rgba(245, 158, 11, 0.08) 0%, transparent 70%); }
    
    .scanner-icon {
      width: 80px; height: 80px; margin-bottom: 32px;
      display: flex; align-items: center; justify-content: center;
      position: relative;
    }
    .scanner-icon svg { width: 48px; height: 48px; color: var(--solar); filter: drop-shadow(0 0 10px var(--solar-glow)); }
    .scanner-icon::after {
      content: ''; position: absolute; inset: -10px; border: 2px solid var(--solar); border-radius: 50%; opacity: 0.3; animation: ping 2s infinite;
    }
    @keyframes ping { 75%, 100% { transform: scale(2); opacity: 0; } }

    .badge { display: inline-flex; background: rgba(245, 158, 11, 0.1); color: var(--solar); padding: 8px 16px; border-radius: 999px; font-size: 10px; font-weight: 800; margin-bottom: 24px; text-transform: uppercase; letter-spacing: 2px; border: 1px solid rgba(245, 158, 11, 0.2); }
    .title { font-family: 'Lexend', sans-serif; font-size: 36px; font-weight: 800; line-height: 1.1; margin-bottom: 20px; letter-spacing: -1.5px; }
    .title span { background: linear-gradient(135deg, #f59e0b, #fbbf24); -webkit-background-clip: text; -webkit-text-fill-color: transparent; text-transform: uppercase; }
    .desc { font-size: 17px; color: var(--muted); margin-bottom: 40px; line-height: 1.6; max-width: 440px; }

    /* QUIZ */
    .header { padding: 32px 24px 16px; display: flex; justify-content: space-between; align-items: center; position: relative; z-index: 10; }
    .progress-wrap { padding: 0 24px; margin-bottom: 40px; }
    .progress-bg { height: 4px; background: rgba(255, 255, 255, 0.05); border-radius: 4px; overflow: hidden; width: 100%; }
    .progress-fill { height: 100%; background: linear-gradient(90deg, var(--solar), #fbbf24); transition: width 0.4s ease; }
    
    .q-wrap { margin-bottom: 32px; }
    .q-num { font-size: 12px; font-weight: 800; color: var(--solar); margin-bottom: 12px; display: block; text-transform: uppercase; letter-spacing: 1px; }
    .q-text { font-size: 24px; font-weight: 700; line-height: 1.2; letter-spacing: -0.5px; }
    
    .options { display: flex; flex-direction: column; gap: 12px; }
    .option { 
      padding: 18px 20px; 
      background: rgba(255, 255, 255, 0.03); 
      border: 1px solid var(--border); 
      border-radius: var(--radius); 
      cursor: pointer; 
      font-weight: 500; 
      transition: all 0.2s cubic-bezier(0.16, 1, 0.3, 1); 
      display: flex; 
      align-items: center; 
      gap: 16px;
      backdrop-filter: blur(5px);
    }
    .option:hover { border-color: rgba(245, 158, 11, 0.3); background: rgba(245, 158, 11, 0.05); transform: translateX(4px); }
    .option.selected { border-color: var(--solar); background: rgba(245, 158, 11, 0.1); }
    
    .opt-ball { width: 32px; height: 32px; border-radius: 10px; background: rgba(255, 255, 255, 0.05); border: 1px solid var(--border); display: flex; align-items: center; justify-content: center; flex-shrink: 0; font-size: 11px; font-weight: 800; color: var(--muted); }
    .option.selected .opt-ball { background: var(--solar); border-color: var(--solar); color: #000; }

    /* ANIMATIONS FOR QUESTIONS */
    .q-fade-in { animation: qFade 0.5s cubic-bezier(0.16, 1, 0.3, 1); }
    @keyframes qFade {
      from { opacity: 0; transform: translateY(20px); filter: blur(10px); }
      to { opacity: 1; transform: translateY(0); filter: blur(0); }
    }

    /* FORM (STEP 8) */
    .form-group { margin-bottom: 24px; }
    .form-label { display: block; font-size: 13px; font-weight: 700; margin-bottom: 10px; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; }
    .form-input { width: 100%; padding: 18px; background: rgba(255, 255, 255, 0.03); border: 1px solid var(--border); border-radius: 16px; font-size: 16px; color: #fff; outline: none; transition: border-color 0.2s; }
    .form-input:focus { border-color: var(--solar); background: rgba(255, 255, 255, 0.05); }
    .form-input option { background-color: #0f172a; color: #fff; }

    /* BUTTONS */
    .btn-primary { 
      background: linear-gradient(135deg, var(--solar), #d97706); 
      color: #000; 
      border: none; 
      padding: 20px; 
      border-radius: 16px; 
      font-size: 18px; 
      font-weight: 800; 
      cursor: pointer; 
      width: 100%; 
      transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1); 
      display: flex; 
      justify-content: center; 
      align-items: center; 
      gap: 12px; 
      text-decoration: none;
      position: relative;
      overflow: hidden;
      box-shadow: 0 10px 30px rgba(245, 158, 11, 0.2);
    }
    .btn-primary::after {
      content: ''; position: absolute; top: -100%; left: -100%; width: 50%; height: 300%; background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.4), transparent); transform: rotate(35deg); animation: scan 3s infinite;
    }
    @keyframes scan { 0% { left: -100%; } 50% { left: 150%; } 100% { left: 150%; } }
    .btn-primary:hover { transform: translateY(-4px); box-shadow: 0 15px 40px rgba(245, 158, 11, 0.4); }
    .btn-primary:active { transform: scale(0.98); }

    /* RESULT */
    .result-view { text-align: center; }
    .result-icon { font-size: 64px; margin-bottom: 24px; filter: drop-shadow(0 0 20px rgba(245, 158, 11, 0.2)); }
    .result-title { font-family: 'Lexend', sans-serif; font-size: 32px; font-weight: 800; margin-bottom: 16px; color: var(--solar); }
    .result-desc { font-size: 16px; color: var(--muted); line-height: 1.6; margin-bottom: 32px; }
    
    /* REJECTION CARDS */
    .rejection-card { background: rgba(255, 255, 255, 0.03); border: 1px solid var(--border); border-radius: 20px; padding: 24px; margin-bottom: 32px; text-align: left; }

    /* LOADING OVERLAY */
    #loading-overlay {
      position: absolute; top: 0; left: 0; right: 0; bottom: 0;
      background: var(--bg);
      display: none; flex-direction: column; align-items: center; justify-content: center;
      z-index: 100; padding: 24px; text-align: center;
    }
    .spinner {
      width: 48px; height: 48px; border: 4px solid rgba(255,255,255,0.05); border-top: 4px solid var(--solar);
      border-radius: 50%; animation: spin 0.8s linear infinite; margin-bottom: 24px;
    }
  </style>
</head>
<body>

  <div class="container">
    
    <!-- LOADING OVERLAY -->
    <div id="loading-overlay">
      <div class="spinner"></div>
      <h3 style="font-family: 'Lexend', sans-serif; font-weight: 800; color: #fff;">Abrindo WhatsApp...</h3>
      <p style="font-size: 14px; color: var(--muted); margin-top: 8px;">Preparando seu atendimento personalizado.</p>
    </div>

    <!-- QUIZ -->
    <div class="view active" id="view-quiz" style="padding: 0;">
      <div class="header">
        <span style="font-weight: 800; font-size: 13px; color: var(--muted); text-transform: uppercase; letter-spacing: 1px;">Simulador Solar</span>
        <span style="font-size: 13px; color: var(--muted); font-weight: 700;" id="quiz-progress-text">1 de 8</span>
      </div>
      <div class="progress-wrap">
        <div class="progress-bg">
          <div class="progress-fill" id="quiz-progress-fill" style="width: 14.2%"></div>
        </div>
      </div>
      <div style="padding: 0 24px 40px; flex: 1;" id="quiz-content-area">
        <div class="q-wrap"><span class="q-num" id="current-q-num">Pergunta 01</span><h2 class="q-text" id="current-q-text">Carregando...</h2></div>
        <div class="options" id="options-container"></div>
      </div>
    </div>

    <!-- FORM (STEP 8) -->
    <div class="view" id="view-form">
      <h1 class="title">Quase <span>Lá</span>!</h1>
      <p class="desc">Informe seus dados para liberar o resultado personalizado.</p>
      <div class="form-group"><label class="form-label">Nome</label><input type="text" class="form-input" id="input-name" placeholder="Seu primeiro nome" autocomplete="given-name"></div>
      
      <div class="form-group"><label class="form-label">WhatsApp</label><input type="tel" class="form-input" id="input-whatsapp" placeholder="(11) 99999-9999" maxlength="15" autocomplete="tel" oninput="this.value = this.value.replace(/\D/g, '').replace(/^(\d{2})(\d)/g, '($1) $2').replace(/(\d)(\d{4})$/, '$1-$2');"></div>

      <div class="form-group"><label class="form-label">Estado (UF)</label>
        <select class="form-input" id="input-state" style="appearance: none; cursor: pointer;" onchange="loadCities(this.value)">
          <option value="" disabled selected>Selecione seu Estado...</option>
          <option value="AC">Acre</option>
          <option value="AL">Alagoas</option>
          <option value="AP">Amapá</option>
          <option value="AM">Amazonas</option>
          <option value="BA">Bahia</option>
          <option value="CE">Ceará</option>
          <option value="DF">Distrito Federal</option>
          <option value="ES">Espírito Santo</option>
          <option value="GO">Goiás</option>
          <option value="MA">Maranhão</option>
          <option value="MT">Mato Grosso</option>
          <option value="MS">Mato Grosso do Sul</option>
          <option value="MG">Minas Gerais</option>
          <option value="PA">Pará</option>
          <option value="PB">Paraíba</option>
          <option value="PR">Paraná</option>
          <option value="PE">Pernambuco</option>
          <option value="PI">Piauí</option>
          <option value="RJ">Rio de Janeiro</option>
          <option value="RN">Rio Grande do Norte</option>
          <option value="RS">Rio Grande do Sul</option>
          <option value="RO">Rondônia</option>
          <option value="RR">Roraima</option>
          <option value="SC">Santa Catarina</option>
          <option value="SP">São Paulo</option>
          <option value="SE">Sergipe</option>
          <option value="TO">Tocantins</option>
        </select>
      </div>

      <div class="form-group"><label class="form-label">Cidade</label>
        <input type="text" class="form-input" id="input-city" list="city-list" placeholder="Escolha o estado primeiro..." disabled autocomplete="off">
        <datalist id="city-list"></datalist>
      </div>
      <button class="btn-primary" id="btn-submit-form" onclick="goToWhatsApp()" style="background: linear-gradient(135deg, #25d366, #128c4a);">
        Falar com Consultor ☀️
        <svg fill="none" stroke="currentColor" viewBox="0 0 24 24" style="width:20px;height:20px;"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M13 7l5 5m0 0l-5 5m5-5H6"></path></svg>
      </button>
    </div>


  </div>

  <script>
    // ── Tracking ───────────────────────────────────────────────────
    var _simAPI = 'https://solardocs-api-irmaosnaobra-aioros.vercel.app';
    var _simSid = (function() {
      var s = sessionStorage.getItem('sim_sid');
      if (!s) { s = 'sim-' + Date.now() + '-' + Math.random().toString(36).slice(2,8); sessionStorage.setItem('sim_sid', s); }
      return s;
    })();
    var _simUtms = (function() {
      var p = new URLSearchParams(window.location.search);
      return { utm_source: p.get('utm_source')||undefined, utm_medium: p.get('utm_medium')||undefined, utm_campaign: p.get('utm_campaign')||undefined, fbclid: p.get('fbclid')||undefined };
    })();

    function _getCookie(name) {
      var value = "; " + document.cookie;
      var parts = value.split("; " + name + "=");
      if (parts.length == 2) return parts.pop().split(";").shift();
    }

    function simTrack(eventType, extra) {
      var fbp = _getCookie('_fbp');
      var fbc = _getCookie('_fbc') || _simUtms.fbclid;
      var payload = Object.assign({
        session_id: _simSid,
        event_type: eventType,
        source: 'simulador',
        fbp: fbp,
        fbc: fbc
      }, _simUtms, extra || {});
      fetch(_simAPI + '/quiz/event', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(payload), keepalive: true }).catch(function(){});
    }
    simTrack('page_view');

    // ── Perguntas ──────────────────────────────────────────────────
    const questions = [
      { q: "Qual o valor médio da sua conta de luz hoje?", opts: ["Até R$ 200", "R$ 200 a R$ 500", "R$ 500 a R$ 1.500", "Acima de R$ 1.500"] },
      { q: "O que te motivou a buscar energia solar agora?", opts: ["Só curiosidade, estou pesquisando preços", "Quero me livrar dos aumentos da conta", "Quero valorizar meu imóvel e ter mais conforto", "Sei que é o melhor investimento disponível hoje"] },
      { q: "Como é o consumo de energia lá em casa ou na empresa?", opts: ["Básico — TV, geladeira e luzes", "Moderado — ar-condicionado às vezes", "Intenso — ar ligado sempre que precisar", "Pesado — ar o dia todo ou maquinário"] },
      { q: "Onde você quer instalar as placas?", opts: ["Apartamento (sem acesso ao telhado)", "Imóvel alugado ou cedido", "Casa própria", "Imóvel comercial ou empresa"] },
      { q: "Como é o telhado ou a área disponível?", opts: ["Não tenho espaço livre", "Tenho área no chão (terreno ou solo)", "Telhado comum (barro, cimento ou cerâmica)", "Telhado metálico, de zinco ou laje plana"] },
      { q: "Quando você precisa que esse projeto fique pronto?", opts: ["Sem pressa, daqui uns 2 meses", "Em torno de 1 mês", "Nos próximos 15 dias", "O mais rápido possível"] },
      { q: "Como você pretende pagar pelo sistema?", opts: ["Ainda não decidi como vou financiar", "Financiamento 100% — trocar a conta pela parcela", "Entrada + financiamento do restante", "À vista ou Pix"] },
      { q: "Você sabe qual é o padrão de energia do seu imóvel?", opts: ["Monofásico 110V", "Monofásico 220V", "Bifásico 220V", "Trifásico 220/380"] }
    ];

    let currentQ = 0;
    const answersData = [];
    const DEST_WA = "5534998165040";

    function nextView(viewId) {
      document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
      const el = document.getElementById(viewId);
      if (el) el.classList.add('active');
    }

    function renderQuestion() {
      const q = questions[currentQ];
      const area = document.getElementById('quiz-content-area');
      area.classList.remove('q-fade-in');
      void area.offsetWidth;
      area.classList.add('q-fade-in');

      document.getElementById('current-q-num').textContent = `Pergunta ${String(currentQ + 1).padStart(2, '0')}`;
      document.getElementById('current-q-text').textContent = q.q;
      document.getElementById('quiz-progress-fill').style.width = ((currentQ + 1) / questions.length * 100) + '%';
      document.getElementById('quiz-progress-text').textContent = `${currentQ + 1} de ${questions.length}`;

      const container = document.getElementById('options-container');
      container.innerHTML = '';
      const letters = ['A', 'B', 'C', 'D'];
      q.opts.forEach((opt, idx) => {
        const div = document.createElement('div');
        div.className = 'option';
        div.innerHTML = `<div class="opt-ball">${letters[idx]}</div><span>${opt}</span>`;
        div.onclick = () => {
          div.classList.add('selected');
          answersData[currentQ] = { q: q.q, a: opt };
          simTrack('step', { step: currentQ + 1, answer: opt });
          setTimeout(() => {
            if (currentQ < questions.length - 1) { currentQ++; renderQuestion(); }
            else { simTrack('form_view'); nextView('view-form'); }
          }, 300);
        };
        container.appendChild(div);
      });
    }

    async function loadCities(uf) {
      const cityInput = document.getElementById('input-city');
      const dataList = document.getElementById('city-list');
      cityInput.value = '';
      dataList.innerHTML = '';
      if (!uf) { cityInput.disabled = true; cityInput.placeholder = "Escolha o estado primeiro..."; return; }
      cityInput.disabled = true;
      cityInput.placeholder = "Carregando cidades...";
      try {
        const res = await fetch(`https://servicodados.ibge.gov.br/api/v1/localidades/estados/${uf}/municipios`);
        const data = await res.json();
        data.forEach(c => { const opt = document.createElement('option'); opt.value = c.nome; dataList.appendChild(opt); });
        cityInput.disabled = false;
        cityInput.placeholder = "Digite para filtrar...";
      } catch(e) { cityInput.disabled = false; cityInput.placeholder = "Digite o nome da cidade"; }
    }

    function goToWhatsApp() {
      const userName = document.getElementById('input-name').value.trim();
      const whatsapp = document.getElementById('input-whatsapp').value.trim();
      const city = document.getElementById('input-city').value.trim();
      const state = document.getElementById('input-state').value.trim();
      if (!userName || !whatsapp || !city || !state) return alert('Preencha todos os campos obrigatórios.');
      if (whatsapp.length < 14) return alert('Preencha um WhatsApp válido.');

      // Pixel
      const leadEventId = _simSid + '_lead';
      if (typeof fbq === 'function') {
        fbq('track', 'Lead', { content_name: 'Simulador Solar B2C', currency: 'BRL', value: 0 }, { eventID: leadEventId });
        fbq('track', 'InitiateCheckout', { content_name: 'Simulador Solar Qualificado', currency: 'BRL', value: 0 }, { eventID: _simSid + '_checkout' });
      }

      // Tracking
      simTrack('form_submitted', { answer: JSON.stringify({ name: userName, whatsapp, city, state }), event_id: leadEventId });
      simTrack('qualified', { event_id: _simSid + '_checkout', answer: JSON.stringify({ name: userName, whatsapp, city, state }) });

      // Monta mensagem com todas as respostas para o SDR
      const answersStr = answersData.map((item, idx) => `${idx + 1}. ${item.q}\n   ➜ ${item.a}`).join('\n\n');
      const msg = encodeURIComponent(
        `Olá! Me chamo *${userName}* e acabei de usar o Simulador Solar Irmãos na Obra.\n\n` +
        `📍 *${city} - ${state}*\n\n` +
        `📋 *Minhas respostas:*\n\n${answersStr}\n\n` +
        `Quero saber mais! ☀️`
      );

      document.getElementById('loading-overlay').style.display = 'flex';
      setTimeout(() => { window.location.href = `https://wa.me/${DEST_WA}?text=${msg}`; }, 1200);
    }

    window.onload = () => {
      simTrack('started');
      renderQuestion();
    };
  </script>
</body>
</html>
