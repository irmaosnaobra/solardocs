name = "zapi-webhook"
main = "webhook.js"
compatibility_date = "2024-01-01"

# Cora — vigilante 24/7, a cada 20 min. O CRM /io é responsabilidade dela.
# Cada tick: vigilância de cards (envelhecimento + reativação) + tentativa
