name = "zapi-webhook"
main = "webhook.js"
compatibility_date = "2024-01-01"

# Cron schedules:
# - "*/20 * * * *": Cora (CRM /io vigilante, env. comercial respeitado por dentro)
# - "* * * * *":    io-broadcast-tick (processa fila de disparos em massa server-side)
# O scheduled handler discrimina pelo padrão do cron.
[triggers]
crons = ["*/20 * * * *", "* * * * *"]
