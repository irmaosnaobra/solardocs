<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@600;700;800;900&family=Playfair+Display:ital,wght@0,800;0,900;1,800&display=swap" rel="stylesheet">
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  body{width:1080px;height:1920px;font-family:'Inter',sans-serif;overflow:hidden}
  .canvas{width:1080px;height:1920px;position:relative;background:linear-gradient(180deg,#f4ede0 0%,#e9dec3 60%,#0b1832 100%)}

  .top{position:absolute;top:80px;left:60px;right:60px;display:flex;align-items:center;justify-content:space-between}
  .brand{display:flex;align-items:center;gap:14px;color:#0b1832}
  .mark{width:54px;height:54px;border-radius:14px;background:linear-gradient(135deg,#c28a2c,#e0a83a);display:flex;align-items:center;justify-content:center;font-family:'Playfair Display';font-weight:900;font-size:30px;color:#0b1832}
  .bname{font-family:'Playfair Display';font-weight:800;font-size:24px}
  .bname small{display:block;font-family:'Inter';font-weight:700;font-size:12px;letter-spacing:.22em;color:#7a5a1c;margin-top:4px}
  .badge{background:#0b1832;color:#fff;font-weight:900;font-size:13px;letter-spacing:.14em;text-transform:uppercase;padding:10px 16px;border-radius:999px}

  .head{position:absolute;top:240px;left:60px;right:60px;color:#0b1832;font-family:'Playfair Display';font-weight:800;font-size:90px;line-height:.98;letter-spacing:-.02em}
  .head em{font-style:italic;color:#c28a2c}

  .sub{position:absolute;top:560px;left:60px;right:60px;color:#0b1832;font-size:22px;font-weight:600;line-height:1.4;opacity:.7}

  .mosaic{position:absolute;top:700px;left:60px;right:60px;height:760px;display:grid;grid-template-columns:1fr 1fr;grid-template-rows:repeat(3,1fr);gap:14px}
  .shot{border-radius:14px;overflow:hidden;background:#0b1832;border:4px solid #fff;box-shadow:0 10px 24px rgba(15,23,42,.18)}
  .shot:nth-child(1){grid-row:span 2}
  .shot:nth-child(2){transform:rotate(2deg)}
  .shot:nth-child(4){transform:rotate(-2deg)}
  .shot img{width:100%;height:100%;object-fit:cover;display:block}

  .stripe{position:absolute;top:1500px;left:0;right:0;background:#c28a2c;color:#0b1832;padding:18px 60px;font-weight:900;font-size:24px;letter-spacing:.06em;text-transform:uppercase;text-align:center}

  .cta-wrap{position:absolute;bottom:110px;left:60px;right:60px}
  .cta{background:#c28a2c;color:#0b1832;font-weight:900;font-size:34px;padding:34px 40px;border-radius:22px;display:flex;align-items:center;justify-content:space-between;box-shadow:0 20px 50px rgba(194,138,44,.55)}
  .cta .arr{background:#0b1832;color:#c28a2c;width:68px;height:68px;border-radius:18px;display:flex;align-items:center;justify-content:center;font-weight:900;font-size:34px}
  .swipe{color:#fff;text-align:center;margin-top:20px;font-size:16px;font-weight:700;letter-spacing:.18em;text-transform:uppercase;opacity:.7}
</style></head>
<body>
<div class="canvas">
  <div class="top">
    <div class="brand"><div class="mark">i</div><div class="bname">Irmãos na Obra<small>ENERGIA SOLAR</small></div></div>
    <div class="badge">★★★★★</div>
  </div>

  <div class="head">+5.000 famílias<br/>já <em>cortaram</em><br/>a conta de luz.</div>
  <div class="sub">Mensagens reais que recebemos no WhatsApp. Todas arquivadas. Todas suas pra conferir.</div>

  <div class="mosaic">
    <div class="shot"><img src="file:///c:/Users/55349/Desktop/CLAUDE/dashboard/public/io/img/fedd4.jpg" alt=""/></div>
    <div class="shot"><img src="file:///c:/Users/55349/Desktop/CLAUDE/dashboard/public/io/img/fedd3.jpg" alt=""/></div>
    <div class="shot"><img src="file:///c:/Users/55349/Desktop/CLAUDE/dashboard/public/io/img/fedd6.jpg" alt=""/></div>
    <div class="shot"><img src="file:///c:/Users/55349/Desktop/CLAUDE/dashboard/public/io/img/fedd5.jpg" alt=""/></div>
    <div class="shot"><img src="file:///c:/Users/55349/Desktop/CLAUDE/dashboard/public/io/img/fedd1.jpg" alt=""/></div>
  </div>

  <div class="stripe">★ ★ ★ ★ ★ — Avaliação 5/5 no Google</div>

  <div class="cta-wrap">
    <div class="cta"><span>Ser a próxima família</span><span class="arr">→</span></div>
    <div class="swipe">↑ arraste pra cima ↑</div>
  </div>
</div>
</body></html>
