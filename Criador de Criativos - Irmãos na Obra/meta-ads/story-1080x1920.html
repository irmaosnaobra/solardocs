<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Story 1080x1920</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&family=Playfair+Display:ital,wght@0,700;0,800;0,900;1,700&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { width: 1080px; height: 1920px; font-family: 'Inter', sans-serif; overflow: hidden; }
  .canvas {
    width: 1080px; height: 1920px;
    position: relative;
    background:
      linear-gradient(180deg, rgba(11, 24, 50, 0.4) 0%, rgba(11, 24, 50, 0.7) 60%, rgba(11, 24, 50, 0.95) 100%),
      url('file:///c:/Users/55349/Desktop/CLAUDE/dashboard/public/io/mosaico/9.jpeg') center/cover;
  }

  .top {
    position: absolute; top: 80px; left: 60px; right: 60px;
    display: flex; align-items: center; justify-content: space-between;
    color: #fff;
  }
  .brand { display: flex; align-items: center; gap: 14px; }
  .brand .mark {
    width: 54px; height: 54px;
    border-radius: 14px;
    background: linear-gradient(135deg, #c28a2c, #e0a83a);
    display: flex; align-items: center; justify-content: center;
    font-family: 'Playfair Display', serif; font-weight: 900; font-size: 30px; color: #0b1832;
  }
  .brand .name { font-family: 'Playfair Display', serif; font-weight: 800; font-size: 24px; }
  .brand .name small { display: block; font-family: 'Inter'; font-weight: 600; font-size: 12px; letter-spacing: 0.22em; opacity: 0.85; margin-top: 4px; }
  .badge {
    background: #c28a2c; color: #0b1832;
    font-weight: 900; font-size: 13px;
    letter-spacing: 0.14em; text-transform: uppercase;
    padding: 10px 16px; border-radius: 999px;
  }

  .hook {
    position: absolute;
    top: 380px; left: 60px; right: 60px;
    color: #fff;
    font-family: 'Playfair Display', serif;
    font-weight: 800;
    font-size: 120px;
    line-height: 0.96;
    letter-spacing: -0.03em;
    text-shadow: 0 6px 32px rgba(0,0,0,0.6);
  }
  .hook em { font-style: italic; color: #f5cf6e; }

  .sub {
    position: absolute;
    top: 760px; left: 60px; right: 60px;
    color: rgba(255,255,255,0.95);
    font-size: 32px; font-weight: 600; line-height: 1.3;
    max-width: 900px;
    text-shadow: 0 4px 16px rgba(0,0,0,0.55);
  }

  .stats {
    position: absolute;
    bottom: 460px; left: 60px; right: 60px;
    display: grid; grid-template-columns: repeat(3, 1fr);
    background: rgba(255, 255, 255, 0.1);
    backdrop-filter: blur(18px);
    border: 1px solid rgba(255,255,255,0.2);
    border-radius: 24px;
    padding: 36px 24px;
    gap: 14px;
  }
  .stat { text-align: center; color: #fff; }
  .stat .n {
    font-family: 'Playfair Display', serif;
    font-weight: 800; font-size: 54px; line-height: 1;
    letter-spacing: -0.01em;
  }
  .stat .n em { font-style: normal; color: #f5cf6e; }
  .stat .l { margin-top: 10px; font-size: 14px; font-weight: 700; letter-spacing: 0.14em; text-transform: uppercase; opacity: 0.85; line-height: 1.3; }

  .cta-wrap {
    position: absolute;
    bottom: 110px; left: 60px; right: 60px;
  }
  .cta {
    background: #c28a2c; color: #0b1832;
    font-weight: 900; font-size: 36px;
    padding: 36px 40px;
    border-radius: 22px;
    display: flex; align-items: center; justify-content: space-between;
    box-shadow: 0 20px 50px rgba(194, 138, 44, 0.55);
    letter-spacing: 0.005em;
  }
  .cta .arrow {
    background: #0b1832; color: #c28a2c;
    width: 70px; height: 70px;
    border-radius: 18px;
    display: flex; align-items: center; justify-content: center;
    font-weight: 900; font-size: 36px;
  }
  .swipe {
    color: #fff; text-align: center; margin-top: 20px;
    font-size: 16px; font-weight: 700;
    letter-spacing: 0.18em; text-transform: uppercase;
    opacity: 0.7;
  }
</style>
</head>
<body>
  <div class="canvas">
    <div class="top">
      <div class="brand"><div class="mark">i</div><div class="name">Irmãos na Obra<small>ENERGIA SOLAR</small></div></div>
      <div class="badge">+5.000 famílias</div>
    </div>

    <div class="hook">Por que pagar<br/><em>conta de luz?</em></div>
    <div class="sub">Energia solar em Uberlândia e mais 27 cidades do Triângulo Mineiro. Garantia de 25 anos. Equipe própria.</div>

    <div class="stats">
      <div class="stat"><div class="n">+<em>5K</em></div><div class="l">Famílias atendidas</div></div>
      <div class="stat"><div class="n"><em>8</em> MWp</div><div class="l">Instalados</div></div>
      <div class="stat"><div class="n"><em>8</em> anos</div><div class="l">No Triângulo</div></div>
    </div>

    <div class="cta-wrap">
      <div class="cta">
        <span>Quero simulação grátis</span>
        <span class="arrow">→</span>
      </div>
      <div class="swipe">↑ arraste pra cima ↑</div>
    </div>
  </div>
</body>
</html>
