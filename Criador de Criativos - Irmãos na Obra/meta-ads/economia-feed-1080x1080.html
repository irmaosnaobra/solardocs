<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@600;700;800;900&family=Playfair+Display:ital,wght@0,800;0,900;1,800&display=swap" rel="stylesheet">
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  body{width:1080px;height:1080px;font-family:'Inter',sans-serif;overflow:hidden}
  .canvas{width:1080px;height:1080px;position:relative;
    background:linear-gradient(180deg,rgba(11,24,50,.4) 0%,rgba(11,24,50,.85) 100%),
      url('file:///c:/Users/55349/Desktop/CLAUDE/dashboard/public/io/mosaico/9.jpeg') center/cover}
  .brand{position:absolute;top:44px;left:44px;display:flex;align-items:center;gap:12px;color:#fff}
  .mark{width:48px;height:48px;border-radius:12px;background:linear-gradient(135deg,#c28a2c,#e0a83a);display:flex;align-items:center;justify-content:center;font-family:'Playfair Display';font-weight:900;font-size:26px;color:#0b1832}
  .bname{font-family:'Playfair Display';font-weight:800;font-size:22px;line-height:1.1}
  .bname small{display:block;font-family:'Inter';font-weight:700;font-size:11px;letter-spacing:.22em;opacity:.85;margin-top:4px}
  .badge{position:absolute;top:60px;right:44px;background:#c28a2c;color:#0b1832;font-weight:900;font-size:13px;letter-spacing:.14em;text-transform:uppercase;padding:10px 18px;border-radius:999px}

  .pre{position:absolute;top:330px;left:60px;color:#f5cf6e;font-size:24px;font-weight:800;letter-spacing:.16em;text-transform:uppercase}
  .num{position:absolute;top:370px;left:60px;color:#fff;font-family:'Playfair Display';font-weight:900;font-size:180px;line-height:1;text-shadow:0 6px 30px rgba(0,0,0,.5);letter-spacing:-.03em}
  .num em{font-style:italic;color:#f5cf6e}
  .hook{position:absolute;top:600px;left:60px;right:60px;color:#fff;font-family:'Playfair Display';font-weight:800;font-size:54px;line-height:1.05;letter-spacing:-.02em;text-shadow:0 4px 20px rgba(0,0,0,.5)}
  .hook em{font-style:italic;color:#f5cf6e}
  .sub{position:absolute;top:790px;left:60px;right:60px;color:rgba(255,255,255,.92);font-size:20px;font-weight:600;line-height:1.4}
  .cta{position:absolute;bottom:50px;left:60px;right:60px;background:#c28a2c;color:#0b1832;font-weight:900;font-size:26px;padding:26px 32px;border-radius:16px;display:flex;align-items:center;justify-content:space-between;box-shadow:0 14px 36px rgba(194,138,44,.5)}
  .cta .arr{background:#0b1832;color:#c28a2c;width:50px;height:50px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-weight:900;font-size:26px}
</style></head>
<body>
<div class="canvas">
  <div class="brand"><div class="mark">i</div><div class="bname">Irmãos na Obra<small>ENERGIA SOLAR</small></div></div>
  <div class="badge">Economia real</div>

  <div class="pre">Em 10 anos, sua casa devolve</div>
  <div class="num">R$ <em>54</em><span style="font-size:120px">mil</span></div>

  <div class="hook">O dinheiro que a CEMIG levaria<br/><em>volta pra dentro de casa.</em></div>
  <div class="sub">Sistema solar paga sozinho em ~4 anos. Os 21 anos seguintes? <b>Tudo economia.</b></div>

  <div class="cta"><span>Quero minha simulação grátis</span><span class="arr">→</span></div>
</div>
</body></html>
