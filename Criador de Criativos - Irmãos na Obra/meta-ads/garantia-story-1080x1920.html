<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@600;700;800;900&family=Playfair+Display:ital,wght@0,800;0,900;1,800&display=swap" rel="stylesheet">
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  body{width:1080px;height:1920px;font-family:'Inter',sans-serif;overflow:hidden}
  .canvas{width:1080px;height:1920px;position:relative;background:linear-gradient(180deg,#7a1f1f 0%,#0b1832 60%,#0b1832 100%)}
  .canvas::before{content:'';position:absolute;inset:0;background:url('file:///c:/Users/55349/Desktop/CLAUDE/dashboard/public/io/mosaico/7.jpeg') center/cover;opacity:.12;mix-blend-mode:luminosity}

  .top{position:absolute;top:80px;left:60px;right:60px;display:flex;align-items:center;justify-content:space-between;color:#fff}
  .brand{display:flex;align-items:center;gap:14px}
  .mark{width:54px;height:54px;border-radius:14px;background:linear-gradient(135deg,#c28a2c,#e0a83a);display:flex;align-items:center;justify-content:center;font-family:'Playfair Display';font-weight:900;font-size:30px;color:#0b1832}
  .bname{font-family:'Playfair Display';font-weight:800;font-size:24px}
  .bname small{display:block;font-family:'Inter';font-weight:700;font-size:12px;letter-spacing:.22em;opacity:.85;margin-top:4px}
  .badge{background:#ffd76a;color:#0b1832;font-weight:900;font-size:13px;letter-spacing:.14em;text-transform:uppercase;padding:10px 16px;border-radius:999px}

  .alert{position:absolute;top:230px;left:60px;right:60px;color:#ffd76a;font-size:18px;font-weight:800;letter-spacing:.16em;text-transform:uppercase;display:flex;align-items:center;gap:14px}
  .alert::before{content:'!';display:inline-flex;width:38px;height:38px;border-radius:50%;background:#ffd76a;color:#7a1f1f;align-items:center;justify-content:center;font-weight:900;font-size:24px}

  .hook{position:absolute;top:330px;left:60px;right:60px;color:#fff;font-family:'Playfair Display';font-weight:800;font-size:108px;line-height:.96;letter-spacing:-.025em;text-shadow:0 6px 24px rgba(0,0,0,.5)}
  .hook em{font-style:italic;color:#ffd76a}

  .timeline{position:absolute;top:870px;left:60px;right:60px;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.18);border-radius:24px;padding:36px 30px;backdrop-filter:blur(14px)}
  .tl-row{display:flex;justify-content:space-between;align-items:center;padding:14px 0;color:#fff}
  .tl-row+.tl-row{border-top:1px solid rgba(255,255,255,.1)}
  .tl-row .y{font-family:'Playfair Display';font-weight:800;font-size:32px;color:#ffd76a}
  .tl-row .v{font-family:'Playfair Display';font-weight:700;font-size:32px}
  .tl-row .v s{opacity:.5}
  .tl-foot{margin-top:12px;padding-top:18px;border-top:2px solid #ffd76a;text-align:center;color:#ffd76a;font-weight:900;font-size:18px;letter-spacing:.14em;text-transform:uppercase}

  .stamp{position:absolute;top:1470px;left:60px;right:60px;text-align:center;color:#fff}
  .stamp .big{font-family:'Playfair Display';font-weight:900;font-size:120px;line-height:1;color:#ffd76a}
  .stamp .lbl{font-size:22px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;margin-top:6px;opacity:.95}

  .cta-wrap{position:absolute;bottom:110px;left:60px;right:60px}
  .cta{background:#ffd76a;color:#0b1832;font-weight:900;font-size:34px;padding:34px 40px;border-radius:22px;display:flex;align-items:center;justify-content:space-between;box-shadow:0 20px 50px rgba(255,215,106,.45)}
  .cta .arr{background:#0b1832;color:#ffd76a;width:68px;height:68px;border-radius:18px;display:flex;align-items:center;justify-content:center;font-weight:900;font-size:34px}
  .swipe{color:#fff;text-align:center;margin-top:20px;font-size:16px;font-weight:700;letter-spacing:.18em;text-transform:uppercase;opacity:.7}
</style></head>
<body>
<div class="canvas">
  <div class="top">
    <div class="brand"><div class="mark">i</div><div class="bname">Irmãos na Obra<small>ENERGIA SOLAR</small></div></div>
    <div class="badge">Garantia 25 anos</div>
  </div>

  <div class="alert">CEMIG · reajuste anunciado</div>

  <div class="hook">Sua conta<br/><em>vai subir</em><br/>de novo.</div>

  <div class="timeline">
    <div class="tl-row"><div class="y">2024</div><div class="v">+9,7%</div></div>
    <div class="tl-row"><div class="y">2025</div><div class="v">+8,1%</div></div>
    <div class="tl-row"><div class="y">2026</div><div class="v">+7,5% previsto</div></div>
    <div class="tl-row"><div class="y">2031</div><div class="v"><s>≈ +50%</s></div></div>
    <div class="tl-foot">Com solar: preço travado por 25 anos</div>
  </div>

  <div class="stamp">
    <div class="big">25 anos</div>
    <div class="lbl">de garantia · zero reajuste</div>
  </div>

  <div class="cta-wrap">
    <div class="cta"><span>Travar minha conta</span><span class="arr">→</span></div>
    <div class="swipe">↑ arraste pra cima ↑</div>
  </div>
</div>
</body></html>
